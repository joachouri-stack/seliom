<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SELIOM — Aperçu iPhone 16 Pro Max</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'Sora', system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 0%, #1f4d57 0%, #0e1d22 60%),
      #0e1d22;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }
  .stage {
    min-height: 100vh;
    padding: 60px 24px 80px;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .head { text-align: center; max-width: 720px; }
  .head .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(232,168,76,.15); color: #E8A84C;
    font-size: 12.5px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
    border: 1px solid rgba(232,168,76,.25);
    margin-bottom: 18px;
  }
  .head h1 {
    font-size: clamp(28px, 4vw, 44px); font-weight: 700; letter-spacing: -.02em;
    margin: 0 0 12px; line-height: 1.1;
  }
  .head p { color: rgba(255,255,255,.7); font-size: 16px; max-width: 540px; margin: 0 auto; line-height: 1.55; }

  .devices {
    display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; align-items: flex-start;
  }
  .device-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .device-label {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: rgba(255,255,255,.5); font-weight: 500;
  }
  .device-label strong { color: white; font-weight: 600; }

  /* iPhone shell — handcrafted, iPhone 16 Pro Max proportions */
  .iphone {
    position: relative;
    width: 460px; height: 940px;
    border-radius: 64px;
    background: linear-gradient(135deg, #2a2a2c 0%, #444 30%, #1c1c1e 70%, #3a3a3c 100%);
    padding: 10px;
    box-shadow:
      0 60px 120px -30px rgba(0,0,0,.7),
      0 0 0 1px rgba(255,255,255,.06),
      inset 0 1px 0 rgba(255,255,255,.15);
  }
  .iphone-inner {
    position: relative; width: 100%; height: 100%;
    border-radius: 54px; overflow: hidden;
    background: #000;
    box-shadow: inset 0 0 0 2px #111;
  }
  .iphone-safearea {
    position: absolute; top: 0; left: 0; right: 0; height: 60px;
    background: #000; z-index: 20;
  }
  .iphone-island {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px; border-radius: 24px;
    background: #000; z-index: 30;
  }
  .iphone-island::after {
    content: ''; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #2c3a45, #000);
    box-shadow: inset 0 0 0 1px #1a1a1a;
  }
  .iphone-statusbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 60px; z-index: 25;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    pointer-events: none;
  }
  .iphone-time {
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    font-weight: 590; font-size: 17px; color: white;
    padding-top: 20px;
  }
  .iphone-icons { padding-top: 20px; display: flex; gap: 6px; align-items: center; color: white; }
  .iphone-home {
    position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    width: 142px; height: 5px; border-radius: 100px;
    background: rgba(255,255,255,.55);
    z-index: 30;
  }
  .iphone-side-btn {
    position: absolute; background: #1a1a1c; border-radius: 2px;
  }
  .btn-action  { left: -3px; top: 130px;  width: 4px; height: 32px; }
  .btn-volup   { left: -3px; top: 200px;  width: 4px; height: 60px; }
  .btn-voldown { left: -3px; top: 280px;  width: 4px; height: 60px; }
  .btn-power   { right: -3px; top: 230px; width: 4px; height: 100px; }

  .iphone iframe {
    position: absolute; top: 60px; bottom: 0; left: 0; right: 0;
    width: 100%; height: calc(100% - 60px);
    border: 0; background: white;
  }

  /* Scale on smaller screens */
  @media (max-width: 1080px) {
    .devices { gap: 40px; }
  }
  @media (max-width: 560px) {
    .stage { padding: 40px 12px 60px; }
    .iphone { transform: scale(.7); transform-origin: top center; margin-bottom: -300px; }
  }

  .info-card {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
    width: 100%; max-width: 760px;
    margin-top: 12px;
  }
  .info {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px; padding: 18px;
  }
  .info .l { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 6px; }
  .info .v { font-size: 16px; font-weight: 600; color: white; }
  @media (max-width: 600px) { .info-card { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="stage">
  <div class="head">
    <div class="eyebrow"><span>📱</span> Aperçu mobile</div>
    <h1>SELIOM sur iPhone 16 Pro Max</h1>
    <p>Le site s'adapte automatiquement à toutes les tailles d'écran. Voici un aperçu de l'expérience mobile, taille réelle.</p>
  </div>

  <div class="devices">
    <div class="device-wrap">
      <div class="iphone">
        <div class="iphone-side-btn btn-action"></div>
        <div class="iphone-side-btn btn-volup"></div>
        <div class="iphone-side-btn btn-voldown"></div>
        <div class="iphone-side-btn btn-power"></div>
        <div class="iphone-inner">
          <div class="iphone-safearea"></div>
          <div class="iphone-island"></div>
          <div class="iphone-statusbar">
            <div class="iphone-time">9:41</div>
            <div class="iphone-icons">
              <svg width="18" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="white"/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="white"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="white"/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="white"/></svg>
              <svg width="16" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="white"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="white"/><circle cx="8.5" cy="10.5" r="1.5" fill="white"/></svg>
              <svg width="26" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-opacity="0.55" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="white"/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="white" fill-opacity="0.55"/></svg>
            </div>
          </div>
          <iframe src="SELIOM.html" title="SELIOM mobile"></iframe>
          <div class="iphone-home"></div>
        </div>
      </div>
      <div class="device-label"><strong>iPhone 16 Pro Max</strong> · 440 × 956 px</div>
    </div>
  </div>

  <div class="info-card">
    <div class="info"><div class="l">Largeur écran</div><div class="v">440 px</div></div>
    <div class="info"><div class="l">Hauteur écran</div><div class="v">956 px</div></div>
    <div class="info"><div class="l">Layout</div><div class="v">1 colonne</div></div>
  </div>
</div>
</body>
</html>
